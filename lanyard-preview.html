<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成员名片动效预览</title>
    <link rel="stylesheet" href="lanyard-preview.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="preview-copy">
        <p class="eyebrow">Member Lanyard Concept</p>
        <h1>把成员名片活动起来</h1>
        <p>毛玻璃工牌、轻微悬挂摆动、飞书头像和姓名。这里先做视觉样稿，不影响线上系统。</p>
      </section>

      <section class="lanyard-stage" aria-label="成员名片预览">
        <article class="lanyard-card primary" style="--delay: 0s; --tilt: -3deg">
          <div class="lanyard-band"></div>
          <div class="lanyard-clip"></div>
          <div class="member-badge">
            <div class="shine"></div>
            <img class="member-avatar" src="https://api.dicebear.com/9.x/notionists/svg?seed=liuyichen&backgroundColor=d7efff" alt="刘依晨" />
            <div class="member-info">
              <span class="role">Oxygen Weekly</span>
              <strong>刘依晨</strong>
              <small>5 个工作日 · 23 条任务</small>
            </div>
            <div class="badge-mark">刘</div>
          </div>
        </article>

        <article class="lanyard-card secondary" style="--delay: -0.8s; --tilt: 4deg">
          <div class="lanyard-band teal"></div>
          <div class="lanyard-clip"></div>
          <div class="member-badge">
            <div class="shine"></div>
            <img class="member-avatar" src="https://api.dicebear.com/9.x/notionists/svg?seed=haoyifei&backgroundColor=e5ddff" alt="郝奕菲" />
            <div class="member-info">
              <span class="role">Project Focus</span>
              <strong>郝奕菲</strong>
              <small>4 个工作日 · 21 条任务</small>
            </div>
            <div class="badge-mark">郝</div>
          </div>
        </article>

        <article class="lanyard-card tertiary" style="--delay: -1.4s; --tilt: -5deg">
          <div class="lanyard-band violet"></div>
          <div class="lanyard-clip"></div>
          <div class="member-badge">
            <div class="shine"></div>
            <img class="member-avatar" src="https://api.dicebear.com/9.x/notionists/svg?seed=xinweishan&backgroundColor=d9fbef" alt="辛味珈" />
            <div class="member-info">
              <span class="role">Project Focus</span>
              <strong>辛味珈</strong>
              <small>2 个工作日 · 9 条任务</small>
            </div>
            <div class="badge-mark">辛</div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
